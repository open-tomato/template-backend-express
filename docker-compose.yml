# Local dev stack for template-service-express.
#
# The `postgres` service is commented out by default — uncomment it if you
# adopt the Drizzle opt-in (see docs/drizzle.md).

services:
  service:
    build: .
    environment:
      PORT: 3000
      LOG_LEVEL: info
      # Uncomment when using the Drizzle opt-in:
      # DATABASE_URL: postgres://template:template@postgres:5432/template
    ports:
      - "3000:3000"
    # Uncomment when using the Drizzle opt-in:
    # depends_on:
